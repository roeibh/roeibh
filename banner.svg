<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 210" width="1000" height="210" role="img" aria-label="Roei — AppSec times AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2231"/>
      <stop offset="100%" stop-color="#141A26"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EFA43C"/>
      <stop offset="100%" stop-color="#EFA43C" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="card">
      <rect width="1000" height="210" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect width="1000" height="210" fill="url(#bg)"/>

    <!-- soft painterly wash, low opacity so it reads as texture not decoration -->
    <circle cx="872" cy="80" r="34" fill="#EFA43C" opacity="0.22"/>
    <g opacity="0.3" fill="none" stroke="#EFA43C" stroke-linecap="round">
      <path d="M690 210 Q 780 96 900 128 T 1010 74" stroke-width="26" opacity="0.55"/>
      <path d="M726 210 Q 826 130 938 158 T 1020 116" stroke-width="16" opacity="0.75"/>
      <path d="M772 212 Q 880 168 968 190" stroke-width="9"/>
    </g>

    <text x="64" y="92" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif"
          font-size="54" font-weight="700" fill="#F2F5FA" letter-spacing="-1">Roei</text>

    <rect x="66" y="112" width="86" height="3" rx="1.5" fill="url(#rule)"/>

    <text x="64" y="146" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif"
          font-size="19" font-weight="500" fill="#AAB4C4">AppSec × AI</text>
    <text x="64" y="174" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="14.5" fill="#6E7C91">security research · agents · things that annoyed me enough to fix</text>
  </g>
</svg>
